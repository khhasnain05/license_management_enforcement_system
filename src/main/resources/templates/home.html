<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DLMS — Portal Entry</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:#0a0f1e;color:#e8edf5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.box{max-width:480px;width:100%;text-align:center;}
.logo{width:56px;height:56px;background:linear-gradient(135deg,#00d4aa,#00b08d);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 20px;}
h1{font-size:1.5rem;margin-bottom:6px;}
p{font-size:.85rem;color:#8892aa;margin-bottom:28px;}
.links{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
a{display:flex;align-items:center;gap:8px;padding:14px 18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#e8edf5;text-decoration:none;font-size:.85rem;font-weight:500;transition:all .2s;}
a:hover{border-color:rgba(0,212,170,.3);background:rgba(0,212,170,.06);color:#00d4aa;}
.icon{font-size:1.1rem;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🚗</div>
  <h1>Punjab DLMS Portal</h1>
  <p>Select a page to preview. In production, routing is handled by Spring Boot controllers.</p>
  <div class="links">
    <a href="pages/login.html"><span class="icon">🔐</span>Login</a>
    <a href="pages/register.html"><span class="icon">📝</span>Register</a>
    <a href="pages/applicant-dashboard.html"><span class="icon">👤</span>Applicant Dashboard</a>
    <a href="pages/officer-dashboard.html"><span class="icon">🏛️</span>Officer Dashboard</a>
    <a href="pages/testing-dashboard.html"><span class="icon">🧪</span>Testing Dashboard</a>
    <a href="pages/police-dashboard.html"><span class="icon">🚔</span>Police Dashboard</a>
    <a href="pages/test-page.html"><span class="icon">📋</span>Theory Test</a>
  </div>
</div>
</body>
</html>
